<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>BurguerZona - Plato</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
<div class="header">
    <h1>BurguerZona</h1>
</div>
<div class="container">
    <h2 th:text="${esEdicion} ? 'Editar Plato' : 'Nuevo Plato'"></h2>
    <br>
    <div class="form-card">
        <form th:action="@{/platos/guardar}" th:object="${plato}" method="post">
            <input type="hidden" th:field="*{idPlato}">
            <div class="form-group">
                <label>Nombre del plato</label>
                <input type="text" th:field="*{nombrePlato}" required>
            </div>
            <div class="form-group">
                <label>Precio</label>
                <input type="number" th:field="*{precio}" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label>Descripcion</label>
                <input type="text" th:field="*{descripcion}">
            </div>
            <button type="submit" class="btn btn-primary"
                    th:text="${esEdicion} ? 'Actualizar' : 'Guardar'"></button>
            <a th:href="@{/platos}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
<div class="footer">
    <p>BurguerZona 2025 - Evidencia GA7-220501096-AA3-EV01 - SENA</p>
</div>
</body>
</html>
