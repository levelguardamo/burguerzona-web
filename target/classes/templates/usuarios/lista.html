<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>BurguerZona - Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
<div class="header">
    <h1>BurguerZona</h1>
</div>
<div class="container">
    <div class="top-bar">
        <h2>Gestion de Usuarios</h2>
        <a th:href="@{/usuarios/nuevo}" class="btn btn-primary">+ Nuevo Usuario</a>
    </div>
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Documento</th>
                <th>Email</th>
                <th>Telefono</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.idUser}"></td>
                <td th:text="${usuario.nombre}"></td>
                <td th:text="${usuario.apellidos}"></td>
                <td th:text="${usuario.tipoDocumento + ' ' + usuario.documento}"></td>
                <td th:text="${usuario.email}"></td>
                <td th:text="${usuario.telefono}"></td>
                <td>
                    <a th:href="@{/usuarios/editar/{id}(id=${usuario.idUser})}"
                       class="btn btn-warning">Editar</a>
                    <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.idUser})}"
                       class="btn btn-danger"
                       onclick="return confirm('Eliminar este usuario?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <br>
    <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
</div>
<div class="footer">
    <p>BurguerZona 2025 - Evidencia GA7-220501096-AA3-EV01 - SENA</p>
</div>
</body>
</html>
