<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>BurguerZona - Facturas</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
<div class="header">
    <h1>BurguerZona</h1>
</div>
<div class="container">
    <div class="top-bar">
        <h2>Gestion de Facturas</h2>
        <a th:href="@{/facturas/nuevo}" class="btn btn-primary">+ Nueva Factura</a>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>ID Pedido</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="factura : ${facturas}">
                <td th:text="${factura.idFactura}"></td>
                <td th:text="${factura.idPedido}"></td>
                <td th:text="${factura.fechaFactura}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(factura.total, 1, 'COMMA', 0, 'POINT')}"></td>
                <td>
                    <a th:href="@{/facturas/editar/{id}(id=${factura.idFactura})}"
                       class="btn btn-warning">Editar</a>
                    <a th:href="@{/facturas/eliminar/{id}(id=${factura.idFactura})}"
                       class="btn btn-danger"
                       onclick="return confirm('Eliminar esta factura?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
    <br>
    <a th:href="@{/}" class="btn btn-secondary">Volver al inicio</a>
</div>
<div class="footer">
    <p>BurguerZona 2025 - Evidencia GA7-220501096-AA3-EV01 - SENA</p>
</div>
</body>
</html>
