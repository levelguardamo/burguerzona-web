<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>BurguerZona - Factura</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
<div class="header">
    <h1>BurguerZona</h1>
</div>
<div class="container">
    <h2 th:text="${esEdicion} ? 'Editar Factura' : 'Nueva Factura'"></h2>
    <br>
    <div class="form-card">
        <form th:action="@{/facturas/guardar}" th:object="${factura}" method="post">
            <input type="hidden" th:field="*{idFactura}">
            <div class="form-group">
                <label>Pedido</label>
                <select th:field="*{idPedido}">
                    <option value="">-- Selecciona un pedido --</option>
                    <option th:each="p : ${pedidos}"
                            th:value="${p.idPedido}"
                            th:text="'Pedido #' + ${p.idPedido}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Fecha de factura</label>
                <input type="date" th:field="*{fechaFactura}" required>
            </div>
            <div class="form-group">
                <label>Total</label>
                <input type="number" th:field="*{total}" step="0.01" min="0" required>
            </div>
            <button type="submit" class="btn btn-primary"
                    th:text="${esEdicion} ? 'Actualizar' : 'Guardar'"></button>
            <a th:href="@{/facturas}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
<div class="footer">
    <p>BurguerZona 2025 - Evidencia GA7-220501096-AA3-EV01 - SENA</p>
</div>
</body>
</html>
