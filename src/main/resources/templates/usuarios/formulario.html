<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>BurguerZona - Usuario</title>
    <link rel="stylesheet" th:href="@{/css/estilo.css}">
</head>
<body>
<div class="header">
    <h1>BurguerZona</h1>
</div>
<div class="container">
    <h2 th:text="${esEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'"></h2>
    <br>
    <div class="form-card">
        <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
            <input type="hidden" th:field="*{idUser}">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" th:field="*{nombre}" required>
            </div>
            <div class="form-group">
                <label>Apellidos</label>
                <input type="text" th:field="*{apellidos}" required>
            </div>
            <div class="form-group">
                <label>Tipo de documento</label>
                <select th:field="*{tipoDocumento}">
                    <option value="CC">Cedula de Ciudadania</option>
                    <option value="TI">Tarjeta de Identidad</option>
                    <option value="CE">Cedula Extranjeria</option>
                </select>
            </div>
            <div class="form-group">
                <label>Numero de documento</label>
                <input type="text" th:field="*{documento}" required>
            </div>
            <div class="form-group">
                <label>Telefono</label>
                <input type="text" th:field="*{telefono}">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" required>
            </div>
            <div class="form-group">
                <label>Fecha de registro</label>
                <input type="date" th:field="*{fechaRegistro}">
            </div>
            <div class="form-group">
                <label>ID Cargo</label>
                <input type="number" th:field="*{idCargo}" min="1" required>
            </div>
            <div class="form-group">
                <label>ID Genero</label>
                <input type="number" th:field="*{idGenero}" min="1" required>
            </div>
            <button type="submit" class="btn btn-primary"
                    th:text="${esEdicion} ? 'Actualizar' : 'Guardar'"></button>
            <a th:href="@{/usuarios}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
<div class="footer">
    <p>BurguerZona 2025 - Evidencia GA7-220501096-AA3-EV01 - SENA</p>
</div>
</body>
</html>
